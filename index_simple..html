<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example Audio Stimuli</title>

  <style>
    body {
      margin: 40px;
      font-family: Arial, Helvetica, sans-serif;
      background: white;
      color: #222;
      font-size: 20px;
      line-height: 1.45;
    }

    h2 {
      font-size: 30px;
      font-weight: 600;
      margin: 0 0 1.2em;
      color: #004c4c;
    }

    .caption {
      font-size: 22px;
      margin-bottom: 1.8em;
    }

    .caption em {
      color: #004c4c;
    }

    .audio-block {
      margin-bottom: 1.8em;
    }

    h3 {
      font-size: 24px;
      font-weight: 600;
      color: #004c4c;
      margin: 0 0 0.4em;
    }

    audio {
      width: 480px;
      max-width: 90%;
    }
  </style>
</head>

<body>

<h2>Example Audio Stimuli</h2>

<p class="caption">
  <em>Example audio stimulus:</em>
  “A, you receive 30 tokens, and the other receives 80.”
</p>

<div class="audio-block">
  <h3>Female AI voice</h3>
  <audio controls preload="auto" src="Female_Example_OptA_cleaned.mp3">
    Your browser does not support the audio element.
  </audio>
</div>

<div class="audio-block">
  <h3>Male AI voice</h3>
  <audio controls preload="auto" src="Male_Example_OptA_cleaned.mp3">
    Your browser does not support the audio element.
  </audio>
</div>

</body>
</html>
