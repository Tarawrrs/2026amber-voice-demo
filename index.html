<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Example Audio Stimuli</title>

  <style>
    :root {
      --teal: #00635d;
      --teal-dark: #004f4a;
      --text: #23343a;
      --muted: #65757a;
      --border: #d7e2e4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--text);
      font-family: "Latin Modern Sans", "LM Sans", "Computer Modern Sans",
                   "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.45;
    }

    .slide {
      width: 100vw;
      min-height: 100vh;
      background: #ffffff;
    }

    .header {
      background: var(--teal);
      color: #ffffff;
      padding: 1.05rem 1.55rem 0.95rem;
      font-size: clamp(1.35rem, 2.1vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .content {
      padding: 3.2rem 7vw 2rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .caption {
      font-size: clamp(1.05rem, 1.4vw, 1.35rem);
      margin: 0 0 2.15rem;
      color: var(--text);
    }

    .caption em {
      font-style: italic;
    }

    .stimulus {
      color: var(--teal-dark);
      font-style: normal;
      font-weight: 600;
    }

    .audio-block {
      margin-bottom: 2.1rem;
    }

    .audio-title {
      color: var(--teal-dark);
      font-size: clamp(1.2rem, 1.6vw, 1.45rem);
      font-weight: 700;
      margin: 0 0 0.5rem;
    }

    audio {
      width: 520px;
      max-width: 100%;
      height: 42px;
      accent-color: var(--teal);
    }
  </style>
</head>

<body>
  <main class="slide">
    <header class="header">Example Audio Stimuli</header>
