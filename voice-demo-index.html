<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Example Audio Stimuli</title>

  <style>
    :root {
      --teal: #00635d;
      --teal-dark: #004f4a;
      --text: #23343a;
      --muted: #65757a;
      --border: #d7e2e4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--text);
      font-family: "Latin Modern Sans", "LM Sans", "Computer Modern Sans",
                   "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.45;
    }

    .slide {
      width: 100vw;
      min-height: 100vh;
      background: #ffffff;
    }

    .header {
      background: var(--teal);
      color: #ffffff;
      padding: 1.05rem 1.55rem 0.95rem;
      font-size: clamp(1.35rem, 2.1vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .content {
      padding: 3.2rem 7vw 2rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    .caption {
      font-size: clamp(1.05rem, 1.4vw, 1.35rem);
      margin: 0 0 2.15rem;
      color: var(--text);
    }

    .caption em {
      font-style: italic;
    }

    .stimulus {
      color: var(--teal-dark);
      font-style: normal;
      font-weight: 600;
    }

    .audio-block {
      margin-bottom: 2.1rem;
    }

    .audio-title {
      color: var(--teal-dark);
      font-size: clamp(1.2rem, 1.6vw, 1.45rem);
      font-weight: 700;
      margin: 0 0 0.5rem;
    }

    audio {
      width: 520px;
      max-width: 100%;
      height: 42px;
      accent-color: var(--teal);
    }

    .small-note {
      margin-top: 2.4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: clamp(0.85rem, 1vw, 0.95rem);
    }

    @media (max-width: 760px) {
      .content {
        padding: 2rem 1.2rem;
      }

      .header {
        padding-left: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <main class="slide">
    <header class="header">Example Audio Stimuli</header>

    <section class="content" aria-label="Example audio stimuli">
      <p class="caption">
        <em>Example audio stimulus:</em>
        <span class="stimulus">“A, you receive 30 tokens, and the other receives 80.”</span>
      </p>

      <div class="audio-block">
        <h2 class="audio-title">Female AI voice</h2>
        <audio controls preload="auto">
          <source src="Female_Example_OptA_cleaned.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>

      <div class="audio-block">
        <h2 class="audio-title">Male AI voice</h2>
        <audio controls preload="auto">
          <source src="Male_Example_OptA_cleaned.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>
      </div>

      <p class="small-note">
        Upload this file with the two MP3 files in the same GitHub repository folder.
      </p>
    </section>
  </main>
</body>
</html>
