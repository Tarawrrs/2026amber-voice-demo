<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Example Audio Stimuli</title>

<style>
    body {
        margin: 40px;
        font-family: "Latin Modern Sans", "LM Sans", "Computer Modern Sans", Arial, Helvetica, sans-serif;
        background: white;
        color: #222;
        font-size: 20px;
    }

    h2 {
        font-size: 30px;
        font-weight: 600;
        margin-bottom: 1.2em;
        color: #004c4c;
    }

    .caption {
        font-size: 22px;
        margin-bottom: 1.8em;
    }

    .caption em {
        color: #004c4c;
    }

    .audio-block {
        margin-bottom: 1.8em;
    }

    h3 {
        font-size: 24px;
        font-weight: 600;
        color: #004c4c;
        margin-bottom: 0.4em;
    }

    audio {
        width: 480px;
        max-width: 90%;
    }
</style>
</head>

<body>

<h2>Example Audio Stimuli</h2>

<p class="caption">
    <em>Example audio stimulus:</em>
    “A, you receive 30 tokens, and the other receives 80.”
</p>

<div class="audio-block">
    <h3>Female AI voice</h3>
    <audio controls preload="auto">
        <source src="data:audio/mpeg;base64,FEMALE_AUDIO_BASE64_HERE" type="audio/mpeg">
    </audio>
</div>

<div class="audio-block">
    <h3>Male AI voice</h3>
    <audio controls preload="auto">
        <source src="data:audio/mpeg;base64,MALE_AUDIO_BASE64_HERE" type="audio/mpeg">
    </audio>
</div>

</body>
</html>
